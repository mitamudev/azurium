<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Denied - Azurium X Edition</title>
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <link rel="icon" type="image/png" href="assets/azuriumxnobg.png" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="denied-body">
  <div class="wall-noise" aria-hidden="true"></div>
  <div class="spray-layer" aria-hidden="true">
    <span class="spray spray-a"></span>
    <span class="spray spray-b"></span>
    <span class="slash slash-a"></span>
    <span class="slash slash-b"></span>
  </div>

  <main class="denied-screen" aria-labelledby="denied-title">
    <a class="brand-mark denied-brand" href="/" aria-label="Azurium X Edition home">
      <img src="assets/azuriumxnobg.png" alt="" />
      <span>Azurium X</span>
    </a>

    <section class="denied-card">
      <div class="denied-stamp">Denied</div>
      <img class="denied-logo" src="assets/azuriumxnobg.png" alt="Azurium X Edition logo" />
      <p class="eyebrow denied-eyebrow"><span></span> Protected Route</p>
      <h1 id="denied-title">Access Denied</h1>
      <p>
        This route is reserved for the Roblox loader client only.
      </p>
      <a class="button button-primary" href="/">Back Home</a>
    </section>
  </main>
</body>

</html>
